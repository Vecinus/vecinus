name: CI Security Monthly Dependency Review

on:
  schedule:
    - cron: "0 7 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  create-monthly-review-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create monthly review issue
        uses: actions/github-script@v8
        with:
          script: |
            const now = new Date();
            const month = now.toISOString().slice(0, 7);
            const title = `[Security] Monthly dependency review ${month}`;

            const { owner, repo } = context.repo;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            if (issues.some((issue) => issue.title === title)) {
              core.info(`Issue already exists: ${title}`);
              return;
            }

            const body = [
              "Monthly dependency review checklist:",
              "",
              "- Review high-risk backend packages:",
              "  - google-genai",
              "  - pypdf",
              "  - PyJWT",
              "  - httpx / requests",
              "  - pinecone-client / langchain",
              "- Review high-risk frontend/transitive packages from npm audit output:",
              "  - undici",
              "  - minimatch",
              "  - tar",
              "  - flatted",
              "- Confirm Dependabot PRs are triaged.",
              "- Confirm CI dependency scan status is green.",
              "- Decide if major-version updates should be scheduled this month.",
            ].join("\n");

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
            });
