name: CI Dependency Scan

on:
  pull_request:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Review dependency changes in PR
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical

  backend-lock-consistency:
    name: Backend lock consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python for lock compilation
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pip-tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-tools

      - name: Verify requirements.txt is up to date
        run: |
          pip-compile --resolver=backtracking --output-file backend/requirements.txt backend/requirements.in
          if ! git diff --exit-code -- backend/requirements.txt; then
            # pip-compile annotations can vary across OSes (Windows/Linux) while
            # package pins remain identical. We only fail on substantive changes.
            if git diff -U0 -- backend/requirements.txt \
              | grep -E '^[+-]' \
              | grep -vE '^(\+\+\+|---)' \
              | grep -vE '^[+-][[:space:]]*(#.*)?$'; then
              echo "::error::backend/requirements.txt is out of date with backend/requirements.in"
              echo "Run: pip-compile --resolver=backtracking --output-file backend/requirements.txt backend/requirements.in"
              exit 1
            fi

            echo "Only annotation/comment differences detected in requirements.txt; continuing."
          fi

  backend-resolution-check:
    name: Backend resolution and smoke checks
    needs: backend-lock-consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate installed dependency tree
        run: pip check

      - name: Smoke test critical imports
        run: |
          python - <<'PY'
          import pypdf
          from google import genai

          print(f"pypdf import OK: {pypdf.__version__}")
          print(f"google.genai import OK: {genai.__name__}")
          PY

  backend-pip-audit-pr:
    name: Backend pip-audit (PR report)
    if: github.event_name == 'pull_request'
    needs: backend-resolution-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Audit backend dependencies (non-blocking in PR)
        run: pip-audit -r backend/requirements.txt --progress-spinner off || true

  backend-pip-audit-nightly:
    name: Backend pip-audit (nightly strict)
    if: github.event_name != 'pull_request'
    needs: backend-resolution-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Scan backend dependencies
        run: pip-audit -r backend/requirements.txt --progress-spinner off

  frontend-npm-audit-pr:
    name: Frontend npm audit (PR critical)
    if: github.event_name == 'pull_request'
    needs: frontend-lock-consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Scan frontend dependencies
        run: npm audit --audit-level=critical
        working-directory: frontend

  frontend-lock-consistency:
    name: Frontend lock consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js for lock verification
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Rebuild lock file from package.json
        run: npm install --package-lock-only --ignore-scripts --no-audit
        working-directory: frontend

      - name: Verify package-lock.json is up to date
        run: |
          if ! git diff --exit-code -- frontend/package-lock.json; then
            echo "::error::frontend/package-lock.json is out of date with frontend/package.json"
            echo "Run: cd frontend && npm install"
            exit 1
          fi

  frontend-npm-audit-nightly:
    name: Frontend npm audit (nightly high)
    if: github.event_name != 'pull_request'
    needs: frontend-lock-consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Scan frontend dependencies
        run: npm audit --audit-level=high
        working-directory: frontend
